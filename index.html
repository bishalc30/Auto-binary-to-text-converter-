<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binary Translator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --surface: #0e1118;
      --surface2: #131720;
      --border: #1c2235;
      --accent: #00ffae;
      --accent-dim: rgba(0,255,174,0.12);
      --blue: #3d8eff;
      --muted: #374060;
      --muted2: #5a6488;
      --text: #dde2f5;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,174,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,174,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 340px;
      background: radial-gradient(ellipse, rgba(0,255,174,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .rain-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .rain-col {
      position: absolute;
      top: -200px;
      font-family: var(--mono);
      color: var(--accent);
      opacity: 0.055;
      animation: rain linear infinite;
      white-space: nowrap;
      writing-mode: vertical-lr;
      letter-spacing: 6px;
    }
    @keyframes rain {
      from { transform: translateY(-200px); }
      to   { transform: translateY(115vh); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
    }

    header {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      border: 1px solid rgba(0,255,174,0.3);
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 22px;
      background: rgba(0,255,174,0.04);
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.05;
      background: linear-gradient(140deg, #fff 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted2);
      letter-spacing: 1.5px;
    }

    .detect-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 1.5px;
      padding: 7px 18px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted2);
      transition: all 0.35s ease;
      margin: 0 auto 28px;
      width: fit-content;
    }

    .detect-pill.is-text {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(61,142,255,0.08);
    }

    .detect-pill.is-binary {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.7s 0.1s ease both;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .card:focus-within {
      border-color: rgba(0,255,174,0.2);
      box-shadow: 0 0 0 1px rgba(0,255,174,0.08), 0 24px 60px rgba(0,0,0,0.5);
    }

    .input-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted2);
    }

    .clear-btn {
      font-family: var(--mono);
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted2);
      padding: 3px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .clear-btn:hover { border-color: #ff5c6a; color: #ff5c6a; }

    textarea#inputArea {
      width: 100%;
      min-height: 170px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.75;
      padding: 20px;
      resize: vertical;
      caret-color: var(--accent);
    }

    textarea#inputArea::placeholder {
      color: var(--muted);
      font-size: 13px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      padding: 0 20px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border));
    }

    .divider-line.right {
      background: linear-gradient(to left, transparent, var(--border));
    }

    .arrow-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted2);
      text-transform: uppercase;
    }

    .arrow-anim {
      color: var(--accent);
      font-size: 16px;
      display: inline-block;
      animation: bounce 1.3s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(4px); }
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
    }

    .output-label-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .output-tag {
      padding: 2px 10px;
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      border: 1px solid var(--border);
      color: var(--muted2);
      background: transparent;
      transition: all 0.35s;
    }

    .output-tag.binary {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .output-tag.text {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(61,142,255,0.08);
    }

    .copy-btn {
      font-family: var(--mono);
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted2);
      padding: 4px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

    textarea#outputArea {
      width: 100%;
      min-height: 170px;
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      outline: none;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.75;
      padding: 20px;
      resize: vertical;
      color: var(--accent);
      cursor: default;
    }

    textarea#outputArea.text-out { color: var(--blue); }

    textarea#outputArea::placeholder {
      color: var(--muted);
      font-size: 13px;
    }

    .stats-bar {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding: 11px 20px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.22);
    }

    .stat {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
    }

    .stat b { color: var(--text); margin-left: 4px; }

    .error-msg {
      display: none;
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: #ff7080;
      padding: 11px 18px;
      border: 1px solid rgba(255,92,106,0.25);
      border-radius: 8px;
      background: rgba(255,92,106,0.05);
    }

    footer {
      margin-top: 48px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    @keyframes pulse-glow {
      0%   { box-shadow: 0 0 0 0 rgba(0,255,174,0.3); }
      100% { box-shadow: 0 0 0 14px rgba(0,255,174,0); }
    }

    .card.flash { animation: pulse-glow 0.5s ease-out; }
  </style>
</head>
<body>

<div class="rain-container" id="rainContainer"></div>

<div class="wrapper">
  <header>
    <div class="badge"><div class="badge-dot"></div> AUTO-DETECT ENABLED</div>
    <h1>Binary Translator</h1>
    <p class="subtitle">// just type or paste — it figures out the rest</p>
  </header>

  <div class="detect-pill" id="detectPill">
    <span id="detectText">Waiting for input…</span>
  </div>

  <div class="card" id="mainCard">

    <div class="input-header">
      <span class="section-label">Input</span>
      <button class="clear-btn" onclick="clearAll()">✕ Clear</button>
    </div>

    <textarea id="inputArea"
      placeholder="Type or paste here…&#10;&#10;  • English text  →  auto-converts to binary&#10;  • Binary code   →  auto-converts to text"
      oninput="onInput()"
      spellcheck="false"
    ></textarea>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="arrow-pill"><span class="arrow-anim">↓</span> Translation</div>
      <div class="divider-line right"></div>
    </div>

    <div class="output-header">
      <div class="output-label-wrap">
        <span class="section-label">Output</span>
        <span class="output-tag" id="outputTag">—</span>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
    </div>

    <textarea id="outputArea" readonly
      placeholder="Your translation will appear here instantly…"
      spellcheck="false"
    ></textarea>

    <div class="stats-bar">
      <span class="stat">Detected <b id="statDetected">—</b></span>
      <span class="stat">Characters in <b id="statIn">0</b></span>
      <span class="stat">Characters out <b id="statOut">0</b></span>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <footer>no buttons needed · just type or paste · share with anyone</footer>
</div>

<script>
  /* Rain */
  const rc = document.getElementById('rainContainer');
  for (let i = 0; i < 16; i++) {
    const c = document.createElement('div');
    c.className = 'rain-col';
    c.style.left = (Math.random() * 100) + '%';
    c.style.animationDuration = (10 + Math.random() * 16) + 's';
    c.style.animationDelay = (-Math.random() * 22) + 's';
    c.style.fontSize = (9 + Math.random() * 5) + 'px';
    let b = '';
    for (let j = 0; j < 70; j++) b += (Math.random() > 0.5 ? '1' : '0') + ' ';
    c.textContent = b;
    rc.appendChild(c);
  }

  /* Detect */
  function detectType(val) {
    if (!val.trim()) return 'empty';
    const stripped = val.replace(/\s+/g, '');
    if (/^[01]+$/.test(stripped)) return 'binary';
    return 'text';
  }

  /* Convert */
  function textToBinary(text) {
    return text.split('').map(ch =>
      ch.charCodeAt(0).toString(2).padStart(8, '0')
    ).join(' ');
  }

  function binaryToText(binary) {
    const stripped = binary.replace(/\s+/g, '');
    if (stripped.length % 8 !== 0) throw new Error('Binary length must be a multiple of 8 bits.');
    const groups = [];
    for (let i = 0; i < stripped.length; i += 8) groups.push(stripped.slice(i, i + 8));
    return groups.map(g => String.fromCharCode(parseInt(g, 2))).join('');
  }

  /* Debounce */
  let timer;
  function onInput() {
    clearTimeout(timer);
    timer = setTimeout(doTranslate, 100);
  }

  function doTranslate() {
    const input = document.getElementById('inputArea').value;
    const pill = document.getElementById('detectPill');
    const detectText = document.getElementById('detectText');
    const outputArea = document.getElementById('outputArea');
    const outputTag = document.getElementById('outputTag');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';
    const type = detectType(input);

    if (type === 'empty') {
      pill.className = 'detect-pill';
      detectText.textContent = 'Waiting for input…';
      outputArea.value = '';
      outputArea.className = '';
      outputTag.textContent = '—';
      outputTag.className = 'output-tag';
      setStats('—', 0, 0);
      return;
    }

    if (type === 'text') {
      pill.className = 'detect-pill is-text';
      detectText.textContent = '📝 English text detected → converting to Binary';
      outputTag.textContent = 'BINARY';
      outputTag.className = 'output-tag binary';
      const result = textToBinary(input);
      outputArea.value = result;
      outputArea.className = '';
      setStats('Text', input.length, result.length);
      flash();
    } else {
      pill.className = 'detect-pill is-binary';
      detectText.textContent = '⚙️ Binary code detected → converting to Text';
      outputTag.textContent = 'TEXT';
      outputTag.className = 'output-tag text';
      try {
        const result = binaryToText(input);
        outputArea.value = result;
        outputArea.className = 'text-out';
        setStats('Binary', input.replace(/\s/g, '').length + ' bits', result.length + ' chars');
        flash();
      } catch (e) {
        outputArea.value = '';
        outputArea.className = '';
        showError(e.message);
        setStats('Binary (error)', 0, 0);
      }
    }
  }

  function setStats(detected, inLen, outLen) {
    document.getElementById('statDetected').textContent = detected;
    document.getElementById('statIn').textContent = inLen;
    document.getElementById('statOut').textContent = outLen;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function flash() {
    const card = document.getElementById('mainCard');
    card.classList.remove('flash');
    void card.offsetWidth;
    card.classList.add('flash');
  }

  function clearAll() {
    document.getElementById('inputArea').value = '';
    document.getElementById('outputArea').value = '';
    document.getElementById('outputArea').className = '';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('detectPill').className = 'detect-pill';
    document.getElementById('detectText').textContent = 'Waiting for input…';
    document.getElementById('outputTag').textContent = '—';
    document.getElementById('outputTag').className = 'output-tag';
    setStats('—', 0, 0);
    document.getElementById('inputArea').focus();
  }

  function copyOutput() {
    const val = document.getElementById('outputArea').value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
